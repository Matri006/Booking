version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: meeting-room-postgres

    environment:
      POSTGRES_DB: meeting_room_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: