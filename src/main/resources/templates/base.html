<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="ru">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'WorkSpace — Бронирование переговорных'">WorkSpace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --surface-3: #f1f5f9;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--surface-2);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
        }

        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 0;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .navbar-custom .container {
            height: 100%;
            display: flex;
            align-items: center;
        }

        .navbar-brand-custom {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.3px;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            background: var(--primary);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2px;
            margin-left: auto;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .nav-link-custom:hover {
            background: var(--surface-3);
            color: var(--text-primary);
        }

        .nav-link-custom.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 6px;
        }

        .btn-nav-logout {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border-radius: 8px;
            color: var(--danger);
            background: none;
            border: none;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-nav-logout:hover {
            background: var(--danger-light);
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13.5px;
            border-radius: 9px;
            padding: 8px 16px;
            border: none;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        }

        .btn-secondary {
            background: var(--surface-3);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            color: white;
        }

        .btn-outline-primary {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn-outline-primary:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-outline-danger {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
        }

        .btn-outline-danger:hover {
            background: var(--danger-light);
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-sm {
            padding: 5px 11px;
            font-size: 12.5px;
            border-radius: 7px;
        }

        .form-control, .form-select {
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            padding: 9px 13px;
            color: var(--text-primary);
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
            outline: none;
        }

        .form-control::placeholder { color: var(--text-muted); }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .table {
            font-size: 13.5px;
        }

        .table th {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            background: var(--surface-2);
        }

        .table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--surface-3);
            color: var(--text-primary);
            vertical-align: middle;
        }

        .table tbody tr:last-child td { border-bottom: none; }

        .table tbody tr:hover td {
            background: var(--surface-2);
        }

        .badge {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 9px;
            border-radius: 20px;
            letter-spacing: 0.02em;
        }

        .badge-role-admin {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        .badge-role-user {
            background: var(--surface-3);
            color: var(--text-secondary);
        }

        .alert {
            border-radius: var(--radius);
            border: none;
            font-size: 13.5px;
            padding: 12px 16px;
        }

        .alert-info {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .alert-danger {
            background: var(--danger-light);
            color: #b91c1c;
        }

        .alert-success {
            background: var(--success-light);
            color: #065f46;
        }

        .footer-custom {
            margin-top: auto;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 18px 0;
            font-size: 12.5px;
            color: var(--text-muted);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.4px;
            margin: 0;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 2px 0 0;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>

<body>

<nav th:fragment="navbar" class="navbar-custom">
    <div class="container">
        <a class="navbar-brand-custom" href="/">
            <div class="brand-icon">
                <i class="bi bi-calendar-check-fill"></i>
            </div>
            WorkSpace
        </a>

        <div class="nav-links">
            <a class="nav-link-custom" href="/rooms">
                <i class="bi bi-grid-3x3-gap"></i> Комнаты
            </a>
            <a class="nav-link-custom" href="/user/dashboard">
                <i class="bi bi-person-circle"></i> Кабинет
            </a>

            <div sec:authorize="hasRole('ADMIN')" style="display: contents;">
                <div class="nav-divider"></div>
                <a class="nav-link-custom" href="/admin/users">
                    <i class="bi bi-people"></i> Пользователи
                </a>
                <a class="nav-link-custom" href="/admin/rooms">
                    <i class="bi bi-door-open"></i> Комнаты (адм.)
                </a>
            </div>

            <div class="nav-divider"></div>

            <form method="post" action="/logout" class="d-inline m-0">
                <button type="submit" class="btn-nav-logout">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

<div th:fragment="content"></div>

<footer th:fragment="footer" class="footer-custom">
    <div class="container d-flex align-items-center justify-content-between">
        <span>© 2026 WorkSpace — система бронирования переговорных</span>
        <div class="d-flex align-items-center gap-1 text-muted" style="font-size:12px;">
            <i class="bi bi-circle-fill" style="font-size:6px; color: var(--success);"></i>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
