<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Бронирование переговорных комнат'">Бронирование переговорных комнат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .room-card {
            transition: transform 0.2s;
            cursor: pointer;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .status-free { color: #198754; }
        .status-busy { color: #dc3545; }
        .sidebar {
            background-color: #f8f9fa;
            min-height: calc(100vh - 56px);
        }
        .notification-item {
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .notification-item.unread {
            background-color: #e7f1ff;
            border-left-color: #0d6efd;
        }
        .notification-item.read {
            opacity: 0.7;
        }
        .time-slot {
            padding: 8px;
            margin: 4px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-slot.free {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        .time-slot.free:hover {
            background-color: #badbcc;
        }
        .time-slot.busy {
            background-color: #f8d7da;
            color: #842029;
            cursor: not-allowed;
        }
        .time-slot.selected {
            background-color: #0d6efd;
            color: white;
        }
        .pagination .page-link {
            color: #0d6efd;
        }
        .pagination .active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-calendar-check"></i> Booking Rooms
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/rooms">
                        <i class="bi bi-door-closed"></i> Комнаты
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/dashboard">
                        <i class="bi bi-person"></i> Личный кабинет
                    </a>
                </li>
                <li class="nav-item">
                    <form method="post" action="/logout" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link" style="display: inline; border: none;">
                            <i class="bi bi-box-arrow-right"></i> Выйти
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div th:fragment="content">
</div>
<footer th:fragment="footer" class="bg-light text-center text-muted py-3 mt-5">
    <div class="container">
        <small>© 2026 Система бронирования переговорных комнат</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
