<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <a href="/bookings/my" class="back-link mb-4 d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left"></i> Мои бронирования
            </a>

            <div class="card">
                <div class="card-body p-4">
                    <div class="form-icon-header mb-4">
                        <div class="form-icon-circle">
                            <i class="bi bi-pencil"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold" style="letter-spacing:-0.3px;">
                                Изменение бронирования
                            </h4>
                            <p class="text-muted mb-0" style="font-size:12.5px;"
                               th:text="'#' + ${booking.id}"></p>
                        </div>
                    </div>

                    <form th:action="@{/bookings/edit/{id}(id=${booking.id})}"
                          th:object="${booking}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">Тема встречи</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Начало</label>
                                <input type="datetime-local" class="form-control"
                                       name="startTime"
                                       th:value="${#temporals.format(booking.startTime, 'yyyy-MM-dd''T''HH:mm')}"
                                       required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Конец</label>
                                <input type="datetime-local" class="form-control"
                                       name="endTime"
                                       th:value="${#temporals.format(booking.endTime, 'yyyy-MM-dd''T''HH:mm')}"
                                       required>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-check-lg"></i> Сохранить
                            </button>
                            <a href="/bookings/my" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>
<style>
    .back-link { color: var(--text-secondary); text-decoration: none; font-size: 13.5px; font-weight: 500; transition: color .15s; }
    .back-link:hover { color: var(--text-primary); }
    .form-icon-header { display: flex; align-items: center; gap: 14px; }
    .form-icon-circle { width: 48px; height: 48px; background: var(--primary-light); border-radius: 13px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 22px; flex-shrink: 0; }
</style>
</body>
</html>
