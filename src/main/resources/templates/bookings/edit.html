<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>

<body>

<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4">

    <h2><i class="bi bi-pencil-square"></i> Редактирование бронирования</h2>

    <form th:action="@{/bookings/edit/{id}(id=${booking.id})}"
          th:object="${booking}"
          method="post"
          class="mt-3">
        <div class="mb-3">
            <label class="form-label">Название</label>
            <input type="text"
                   class="form-control"
                   th:field="*{title}"
                   required>
        </div>
        <div class="mb-3">
            <label class="form-label">Время начала</label>
            <input type="datetime-local"
                   class="form-control"
                   name="startTime"
                   th:value="${#temporals.format(booking.startTime, 'yyyy-MM-dd''T''HH:mm')}"
                   required>
        </div>
        <div class="mb-3">
            <label class="form-label">Время окончания</label>
            <input type="datetime-local"
                   class="form-control"
                   name="endTime"
                   th:value="${#temporals.format(booking.endTime, 'yyyy-MM-dd''T''HH:mm')}"
                   required>
        </div>
        <button type="submit" class="btn btn-primary">
            Сохранить
        </button>

        <a href="/bookings/my" class="btn btn-secondary">
            Назад
        </a>

    </form>

</div>

<div th:replace="~{base :: footer}"></div>

</body>
</html>
