<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <a href="/admin/rooms" class="back-link mb-4 d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left"></i> Назад к списку
            </a>

            <div class="card">
                <div class="card-body p-4">
                    <div class="form-icon-header mb-4">
                        <div class="form-icon-circle">
                            <i class="bi bi-pencil-square"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold" style="letter-spacing:-0.3px;">
                                Редактирование комнаты
                            </h4>
                            <p class="text-muted mb-0" style="font-size:12.5px;"
                               th:text="'#' + ${room.id}"></p>
                        </div>
                    </div>

                    <form th:action="@{/admin/rooms/edit/{id}(id=${room.id})}"
                          th:object="${room}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input class="form-control" th:field="*{name}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Вместимость</label>
                            <div class="input-group-custom">
                                <i class="bi bi-people input-group-icon"></i>
                                <input type="number" class="form-control ps-5"
                                       th:field="*{capacity}" min="1">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Локация</label>
                            <div class="input-group-custom">
                                <i class="bi bi-geo-alt input-group-icon"></i>
                                <input class="form-control ps-5" th:field="*{location}">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-check-lg"></i> Сохранить
                            </button>
                            <a href="/admin/rooms" class="btn btn-secondary">
                                Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>
<style>
    .back-link { color: var(--text-secondary); text-decoration: none; font-size: 13.5px; font-weight: 500; transition: color 0.15s; }
    .back-link:hover { color: var(--text-primary); }
    .form-icon-header { display: flex; align-items: center; gap: 14px; }
    .form-icon-circle { width: 48px; height: 48px; background: var(--primary-light); border-radius: 13px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 22px; flex-shrink: 0; }
    .input-group-custom { position: relative; }
    .input-group-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
</style>
</body>
</html>
