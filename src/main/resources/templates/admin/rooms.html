<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>

<body>

<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-door-closed"></i> Комнаты</h2>

        <a href="/admin/rooms/create" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Создать комнату
        </a>
    </div>

    <table class="table table-hover mt-3">

        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Вместимость</th>
            <th>Локация</th>
            <th>Действия</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(rooms)}">
            <td colspan="5" class="text-center text-muted">
                Комнат нет
            </td>
        </tr>

        <tr th:each="r : ${rooms}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.name}"></td>
            <td th:text="${r.capacity}"></td>
            <td th:text="${r.location}"></td>

            <td class="d-flex gap-2">

                <!-- EDIT -->
                <a th:href="@{/admin/rooms/edit/{id}(id=${r.id})}"
                   class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                </a>

                <!-- DELETE -->
                <form th:action="@{/admin/rooms/delete/{id}(id=${r.id})}"
                      method="post"
                      onsubmit="return confirm('Удалить комнату?')">

                    <button type="submit"
                            class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </button>

                </form>

            </td>
        </tr>

        </tbody>
    </table>

</div>

<div th:replace="~{base :: footer}"></div>

</body>
</html>
