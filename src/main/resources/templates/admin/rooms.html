<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4 pb-5">
    <div class="page-header">
        <div>
            <h1 class="page-title">Управление комнатами</h1>
            <p class="page-subtitle">Создание, редактирование и фильтрация переговорных</p>
        </div>
        <a href="/admin/rooms/create" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Создать комнату
        </a>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="width:60px;">ID</th>
                    <th>Название</th>
                    <th>Вместимость</th>
                    <th>Локация</th>
                    <th style="width:120px;">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rooms)}">
                    <td colspan="5" class="text-center py-5" style="color: var(--text-muted);">
                        <i class="bi bi-door-closed d-block mb-2" style="font-size: 28px; opacity:.4;"></i>
                        Комнаты не найдены
                    </td>
                </tr>
                <tr th:each="r : ${rooms}">
                    <td style="color: var(--text-muted); font-size: 12px;"
                        th:text="'#' + ${r.id}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div style="width:32px;height:32px;background:var(--primary-light);
                                        border-radius:8px;display:flex;align-items:center;
                                        justify-content:center;color:var(--primary);font-size:14px;">
                                <i class="bi bi-building"></i>
                            </div>
                            <span class="fw-semibold" th:text="${r.name}"></span>
                        </div>
                    </td>
                    <td>
                        <span class="d-flex align-items-center gap-1" style="color:var(--text-secondary);">
                            <i class="bi bi-people" style="font-size:13px;"></i>
                            <span th:text="${r.capacity} + ' чел.'"></span>
                        </span>
                    </td>
                    <td style="color: var(--text-secondary);" th:text="${r.location ?: '—'}"></td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/admin/rooms/edit/{id}(id=${r.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/rooms/delete/{id}(id=${r.id})}" method="post"
                                  onsubmit="return confirm('Удалить комнату «' + this.dataset.name + '»?')"
                                  th:data-name="${r.name}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>
</body>
</html>
