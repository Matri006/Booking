<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <a href="/admin/users" class="back-link mb-4 d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left"></i> Назад
            </a>

            <div class="card">
                <div class="card-body p-4">
                    <div class="form-icon-header mb-4">
                        <div class="user-avatar-lg"
                             th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">И</div>
                        <div>
                            <h4 class="mb-0 fw-bold" style="letter-spacing:-0.3px;"
                                th:text="${user.username}">Иванов</h4>
                            <p class="text-muted mb-0" style="font-size:12.5px;"
                               th:text="${user.email}">ivan@example.com</p>
                        </div>
                    </div>

                    <hr style="border-color: var(--border); margin: 0 0 20px;">

                    <form th:action="@{/admin/users/edit/{id}(id=${user.id})}"
                          th:object="${user}"
                          method="post">

                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input class="form-control" th:field="*{username}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input class="form-control" th:field="*{email}" type="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Роль</label>
                            <select class="form-select" th:field="*{role}">
                                <option th:value="USER">Сотрудник (USER)</option>
                                <option th:value="ADMIN">Администратор (ADMIN)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Статус</label>
                            <select class="form-select" th:field="*{enabled}">
                                <option th:value="true">Активен</option>
                                <option th:value="false">Заблокирован</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Новый пароль</label>
                            <div class="input-group-custom">
                                <i class="bi bi-lock input-group-icon"></i>
                                <input class="form-control ps-5" type="password"
                                       name="newPassword"
                                       placeholder="Оставьте пустым, чтобы не менять">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-check-lg"></i> Сохранить
                            </button>
                            <a href="/admin/users" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>
<style>
    .back-link { color: var(--text-secondary); text-decoration: none; font-size: 13.5px; font-weight: 500; transition: color .15s; }
    .back-link:hover { color: var(--text-primary); }
    .form-icon-header { display: flex; align-items: center; gap: 14px; }
    .user-avatar-lg { width: 52px; height: 52px; border-radius: 14px; background: var(--primary); color: white; font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .input-group-custom { position: relative; }
    .input-group-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
</style>
</body>
</html>
