<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4 pb-5">
    <div class="page-header">
        <div>
            <h1 class="page-title">Пользователи</h1>
            <p class="page-subtitle">Управление учётными записями</p>
        </div>
        <a href="/admin/users/create" class="btn btn-success">
            <i class="bi bi-person-plus"></i> Создать пользователя
        </a>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                <tr>
                    <th style="width:60px;">ID</th>
                    <th>Пользователь</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th style="width:120px;">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td style="color: var(--text-muted); font-size: 12px;"
                        th:text="'#' + ${u.id}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="user-avatar-sm"
                                 th:text="${#strings.substring(u.username, 0, 1).toUpperCase()}">И</div>
                            <span class="fw-semibold" th:text="${u.username}"></span>
                        </div>
                    </td>
                    <td style="color: var(--text-secondary);" th:text="${u.email}"></td>
                    <td>
                        <span th:if="${u.role.toString() == 'ADMIN'}"
                              class="role-badge role-badge-admin">
                            <i class="bi bi-shield-fill"></i> ADMIN
                        </span>
                        <span th:if="${u.role.toString() != 'ADMIN'}"
                              class="role-badge role-badge-user">
                            <i class="bi bi-person-fill"></i> USER
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/admin/users/edit/{id}(id=${u.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/users/delete/{id}(id=${u.id})}"
                                  method="post"
                                  onsubmit="return confirm('Удалить пользователя?')">
                                <button class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" class="text-center py-5" style="color: var(--text-muted);">
                        <i class="bi bi-people d-block mb-2" style="font-size: 28px; opacity:.4;"></i>
                        Пользователей нет
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>
<style>
    .user-avatar-sm {
        width: 32px; height: 32px;
        border-radius: 50%;
        background: var(--primary-light);
        color: var(--primary);
        font-size: 13px;
        font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .role-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 600;
    }
    .role-badge-admin { background: var(--primary-light); color: var(--primary-dark); }
    .role-badge-user  { background: var(--surface-3); color: var(--text-secondary); }
</style>
</body>
</html>
