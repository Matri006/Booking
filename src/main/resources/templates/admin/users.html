<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>

<body>

<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-people"></i> Пользователи</h2>

        <a href="/admin/users/create" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Создать пользователя
        </a>
    </div>

    <table class="table table-hover mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Email</th>
            <th>Роль</th>
            <th>Действия</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td>
                <span class="badge bg-secondary" th:text="${u.role}"></span>
            </td>

            <td class="d-flex gap-2">

                <!-- EDIT -->
                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}"
                   class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                </a>

                <!-- DELETE -->
                <form th:action="@{/admin/users/delete/{id}(id=${u.id})}"
                      method="post"
                      onsubmit="return confirm('Удалить пользователя?')">

                    <button class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                    </button>

                </form>

            </td>
        </tr>
        </tbody>
    </table>

</div>

<div th:replace="~{base :: footer}"></div>

</body>
</html>
