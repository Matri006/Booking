<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb-custom">
                    <li><a href="/rooms">Комнаты</a></li>
                    <li><i class="bi bi-chevron-right"></i></li>
                    <li class="active">Новая встреча</li>
                </ol>
            </nav>

            <div class="card">
                <div class="card-body p-4">
                    <div class="form-icon-header mb-4">
                        <div class="form-icon-circle">
                            <i class="bi bi-calendar-plus"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold" style="letter-spacing:-0.3px;">Новая встреча</h4>
                            <p class="text-muted mb-0" style="font-size:12.5px;">
                                Заполните детали бронирования
                            </p>
                        </div>
                    </div>

                    <form th:action="@{/bookings/create}"
                          th:object="${booking}"
                          method="post"
                          id="bookingForm">

                        <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

                        <div class="mb-3">
                            <label class="form-label">Переговорная *</label>
                            <select th:field="*{roomId}" class="form-select" id="roomSelect" required>
                                <option value="">Выберите комнату...</option>
                                <option th:each="room : ${rooms}"
                                        th:value="${room.id}"
                                        th:text="${room.name + ' · ' + room.capacity + ' чел.'}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Тема встречи *
                                <span id="charCount" style="font-weight:400; color: var(--text-muted);">
                                    0 / 200
                                </span>
                            </label>
                            <textarea th:field="*{title}" class="form-control"
                                      rows="2" maxlength="200"
                                      placeholder="О чём встреча?"></textarea>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Начало *</label>
                                <input type="datetime-local" th:field="*{startTime}"
                                       class="form-control" id="startTime" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Конец *</label>
                                <input type="datetime-local" th:field="*{endTime}"
                                       class="form-control" id="endTime" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between gap-2">
                            <a href="/rooms" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Назад
                            </a>
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-check-lg"></i> Забронировать
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: footer}"></div>

<style>
    .breadcrumb-custom { display: flex; align-items: center; gap: 6px; list-style: none; padding: 0; margin: 0; font-size: 13px; }
    .breadcrumb-custom a { color: var(--text-secondary); text-decoration: none; }
    .breadcrumb-custom a:hover { color: var(--text-primary); }
    .breadcrumb-custom .active { color: var(--text-primary); font-weight: 500; }
    .breadcrumb-custom i { color: var(--text-muted); font-size: 11px; }
    .form-icon-header { display: flex; align-items: center; gap: 14px; }
    .form-icon-circle { width: 48px; height: 48px; background: var(--primary-light); border-radius: 13px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 22px; flex-shrink: 0; }
</style>

<script>
    const titleArea = document.querySelector('[name="title"]');
    const charCount = document.getElementById('charCount');

    function updateCount() {
        const len = titleArea?.value.length || 0;
        if (charCount) charCount.textContent = `${len} / 200`;
        if (len > 180) charCount.style.color = 'var(--danger)';
        else charCount.style.color = 'var(--text-muted)';
    }

    titleArea?.addEventListener('input', updateCount);

    document.addEventListener('DOMContentLoaded', () => {
        updateCount();
        const qRoom = localStorage.getItem('quickRoomId');
        const qStart = localStorage.getItem('quickStartTime');
        const qEnd = localStorage.getItem('quickEndTime');

        if (qRoom && document.getElementById('roomSelect')) {
            document.getElementById('roomSelect').value = qRoom;
            localStorage.removeItem('quickRoomId');
        }
        if (qStart && document.getElementById('startTime')) {
            document.getElementById('startTime').value =
                new Date(qStart).toISOString().slice(0, 16);
            localStorage.removeItem('quickStartTime');
        }
        if (qEnd && document.getElementById('endTime')) {
            document.getElementById('endTime').value =
                new Date(qEnd).toISOString().slice(0, 16);
            localStorage.removeItem('quickEndTime');
        }
    });
</script>
</body>
</html>
