spring:
  application:
    name: booking
  datasource:
    url: jdbc:postgresql://localhost:5433/meeting_room_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
jwt:
  secret: mySuperSecretKeyMySuperSecretKey123456
  expiration: 86400000